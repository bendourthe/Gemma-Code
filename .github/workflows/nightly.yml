name: Nightly

on:
  schedule:
    - cron: "0 2 * * *"  # 02:00 UTC every day
  workflow_dispatch:      # allow manual trigger

jobs:

  # ── Full integration tests (requires Ollama) ──────────────────────────────

  integration-ts:
    name: TypeScript integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          # Wait for the server to be ready
          timeout 30 bash -c 'until curl -sf http://localhost:11434/api/tags; do sleep 1; done'

      - name: Pull Gemma model (small variant for CI)
        run: ollama pull gemma3:2b

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci --prefer-offline --no-audit --silent
      - run: npm run build

      - name: Run integration tests
        env:
          OLLAMA_URL: "http://localhost:11434"
          TEST_MODEL: "gemma3:2b"
        run: npm run test:integration -- --reporter=verbose

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-results
          path: coverage/
          retention-days: 14

  integration-py:
    name: Python backend integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend
    steps:
      - uses: actions/checkout@v4

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          timeout 30 bash -c 'until curl -sf http://localhost:11434/api/tags; do sleep 1; done'

      - name: Pull Gemma model (small variant for CI)
        run: ollama pull gemma3:2b

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Run integration tests
        env:
          OLLAMA_URL: "http://localhost:11434"
          MODEL_NAME: "gemma3:2b"
        run: uv run pytest tests/integration -v --cov=src/backend --cov-report=xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: py-integration-coverage
          path: src/backend/coverage.xml
          retention-days: 14

  # ── Performance benchmarks ────────────────────────────────────────────────

  benchmarks:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci --prefer-offline --no-audit --silent
      - run: npm run build

      - name: Run benchmarks
        run: npm run bench -- --reporter=verbose 2>&1 | tee bench-results.txt

      - uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: bench-results.txt
          retention-days: 30

  # ── Failure notification ──────────────────────────────────────────────────

  notify-on-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [integration-ts, integration-py, benchmarks]
    if: failure()
    steps:
      - name: Send failure notification
        # Configure SLACK_WEBHOOK_URL in repository secrets to enable Slack notifications.
        # If the secret is absent the step exits silently.
        run: |
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            curl -s -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              --data "{
                \"text\": \":x: *Gemma Code nightly* failed on \`${{ github.ref_name }}\`.\nSee: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
              }"
          fi
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
