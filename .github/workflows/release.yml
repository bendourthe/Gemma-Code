name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:

  # ── Build VSIX (Linux, fast) ───────────────────────────────────────────────

  build-vsix:
    name: Build VSIX
    runs-on: ubuntu-latest
    outputs:
      vsix_name: ${{ steps.package.outputs.vsix_name }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci --prefer-offline --no-audit --silent

      - run: npm run lint
      - run: npm run test
      - run: npm run build

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Package VSIX
        id: package
        run: |
          npx vsce package --no-dependencies
          VSIX="gemma-code-${{ steps.version.outputs.version }}.vsix"
          echo "vsix_name=$VSIX" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: "*.vsix"
          retention-days: 30

  # ── Build Windows installer ────────────────────────────────────────────────

  build-installer:
    name: Build Windows installer
    runs-on: windows-latest
    needs: build-vsix
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix
          path: .

      - name: Build installer
        run: >
          pwsh -NonInteractive -File scripts/installer/build-installer.ps1
          -SkipSign -SkipVsix

      - uses: actions/upload-artifact@v4
        with:
          name: installer
          path: scripts/installer/setup.exe
          retention-days: 30

  # ── Create GitHub Release ─────────────────────────────────────────────────

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-vsix, build-installer]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: vsix
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: installer
          path: artifacts/

      - name: Extract release notes from CHANGELOG
        id: changelog
        run: |
          VERSION="${{ needs.build-vsix.outputs.version }}"
          NOTES=$(awk "/^## \[?${VERSION}\]?/{flag=1; next} /^## /{flag=0} flag" CHANGELOG.md)
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Gemma Code v${{ needs.build-vsix.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
          files: |
            artifacts/${{ needs.build-vsix.outputs.vsix_name }}
            artifacts/setup.exe
